name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  audit-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Zero dependencies: the rule engine is pure JS and the tests use the
      # built-in node:test runner, so there's nothing to install.
      - run: node --test
